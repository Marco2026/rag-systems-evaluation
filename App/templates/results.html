<!DOCTYPE html>
<html>
    <head>
        <title>RAG Results Viewer</title>
        <link rel="stylesheet" href="{{ url_for('static', path='/style.css') }}">
        <link rel="stylesheet" href="{{ url_for('static', path='/results.css') }}">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    </head>
    <body>
        <div class="header">
            <div class="top-actions">
                <div class="nav-spacer" aria-hidden="true"></div>
                <div class="page-nav">
                    <a class="page-nav-btn" href="/">Chat</a>
                    <a class="page-nav-btn active" href="/results">Benchmark Results</a>
                </div>
            </div>
            <h1>Resultados del Benchmark</h1>
            <p>Comparativa retriever x generator</p>
        </div>

        <main id="results-page">
            <section class="toolbar card">
                <div class="toolbar-left">
                    <label for="benchmark-select">Benchmark</label>
                    <select id="benchmark-select"></select>
                    <button id="reload-btn" class="action-btn" type="button">Recargar</button>
                </div>
                <div class="toolbar-right">
                    <button id="export-btn" class="action-btn" type="button">Exportar</button>
                </div>
            </section>

            <section class="card">
                <div class="section-header-row">
                    <h2>Tabla comparativa (accuracy)</h2>
                    <div class="source-switch-row">
                        <span class="source-switch-label">Postprocesado</span>
                        <button id="accuracy-source-toggle" class="source-switch" type="button" aria-pressed="false" aria-label="Activar postprocesado"></button>
                    </div>
                </div>
                <div id="matrix-container"></div>
            </section>

            <section class="card">
                <h2>Análisis por parámetros</h2>
                <p id="curve-caption" class="hint">Selecciona una fila o columna para dibujar la curva.</p>
                <div id="curve-plot" class="plot"></div>
            </section>

            <section class="card">
                <h2>Detalle de combinación</h2>
                <div id="detail-summary" class="detail-summary">Selecciona una celda para ver detalle.</div>
                <div id="detail-results" class="detail-results"></div>
            </section>
        </main>

        <script src="{{ url_for('static', path='/results.js') }}"></script>
    </body>
</html>
