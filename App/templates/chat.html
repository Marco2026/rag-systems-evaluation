<!DOCTYPE html>
<html>
    <head>
        <title>RAG de Marco</title>
        <link rel="stylesheet" href="{{ url_for('static', path='/style.css') }}">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <div class="header">
            <h1>Bienvenido al RAG de Marco</h1>
            <p>Haz la pregunta de pádel que quieras</p>
        </div>
        <div class="suggestions">
            <button class="suggestion-btn" onclick="usePrompt('¿Dónde se creó el pádel?')">Origen del deporte</button>
            <button class="suggestion-btn" onclick="usePrompt('¿Quiénes fueron los primeros número 1?')">Primeros nº1</button>
            <button class="suggestion-btn" onclick="usePrompt('¿Cómo se encuentra actualmente el pádel?')">Actualidad</button>
            <button id="start-rag-btn" class="suggestion-btn" onclick="startRag()">Start RAG</button>
        </div>
        <div id="chat-container">
            <div id="messages"></div>
            <div class="input-container">
                <div class="input-wrapper">
                    <input type="text" id="message-input" placeholder="Escribe tu mensaje...">
                </div>
                <button onclick="sendMessage()">Send</button>
                <button id="new-chat-btn" onclick="startNewChat()">New Chat</button>
            </div>
        </div>
        <script>
            const messagesContainer = document.getElementById('messages');
            const messageInput = document.getElementById('message-input');
            const startRagBtn = document.getElementById('start-rag-btn');
            let currentChatId = null;
            let currentUserId = null;
            let ragStarted = false;

            function startRag() {
                fetch('/api/start_rag', {
                    method: 'POST'
                })
                .then(response => response.json())
                .then(data => {
                    ragStarted = true;
                    startRagBtn.textContent = 'RAG Started';
                    startRagBtn.disabled = true;
                    appendMessage('assistant', data.message);
                })
                .catch(() => {
                    alert('Error starting RAG');
                });
            }

            function startNewChat() {
                fetch('/api/create_chat', {
                    method: 'POST'
                })
                .then(response => response.json())
                .then(data => {
                    messagesContainer.innerHTML = '';
                })
                .catch(() => {
                    alert('Error creating chat');
                });
            }

            function appendMessage(role, content) {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${role}`;
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                bubble.textContent = content;
                messageDiv.appendChild(bubble);
                messagesContainer.appendChild(messageDiv);
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }

            function sendMessage() {
                const message = messageInput.value.trim();
                if (!message) return;
                if (!ragStarted) {
                    alert("Primero pulsa 'Start RAG'");
                    return;
                }
                appendMessage('user', message);
                messageInput.value = '';

                // Mostrar indicador de escritura
                const typingDiv = document.createElement('div');
                typingDiv.className = 'message assistant';
                typingDiv.id = 'typing';
                typingDiv.innerHTML = '<div class="bubble typing-indicator"><span></span><span></span><span></span></div>';
                messagesContainer.appendChild(typingDiv);
                messagesContainer.scrollTop = messagesContainer.scrollHeight;

                fetch('/api/send_message', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: currentUserId,
                        chat_id: currentChatId,
                        message: message
                    })
                })
                .then(response => response.json())
                .then(data => {
                    document.getElementById('typing')?.remove();
                    if (data.message) {
                        appendMessage('assistant', data.message);
                    } else {
                        appendMessage('assistant', data.detail || 'Error sending message');
                    }
                })
                .catch(() => {
                    document.getElementById('typing')?.remove();
                    alert('Error sending message');
                });
            }

            function fetchData() {
                fetch('/your_endpoint', { method: 'GET' })
                    .then(response => response.json()) // Convert the response to JSON
                    .then(data => {
                        console.log('Success:', data); // Do something with the data
                    })
                    .catch(error => {
                        console.error('Error occurred:', error); // Handle any errors
                    });
            }

            function usePrompt(prompt) {
                messageInput.value = prompt;
                sendMessage();
            }

            document.addEventListener('DOMContentLoaded', startNewChat);

            messageInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
        </script>
    </body>
</html>
