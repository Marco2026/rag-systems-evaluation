<!DOCTYPE html>
<html>
    <head>
        <title>RAG de Marco</title>
        <link rel="stylesheet" href="{{ url_for('static', path='/style.css') }}">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <div class="header">
            <div class="top-actions">
                <div class="rag-controls">
                    <button id="start-rag-btn" class="start-rag-main" onclick="startRag()">Start RAG</button>
                    <span id="rag-status" class="rag-status not-started">No iniciado</span>
                </div>
                <div class="page-nav">
                    <a class="page-nav-btn active" href="/">Chat</a>
                    <a class="page-nav-btn" href="/results">Benchmark Results</a>
                </div>
            </div>
            <h1>Bienvenido al RAG de Marco</h1>
            <p>Haz la pregunta de pádel que quieras</p>
        </div>
        <div class="suggestions">
            <button class="suggestion-btn" onclick="usePrompt('¿Dónde se creó el pádel?')">Origen del deporte</button>
            <button class="suggestion-btn" onclick="usePrompt('¿Quiénes fueron los primeros número 1?')">Primeros nº1</button>
            <button class="suggestion-btn" onclick="usePrompt('¿Cómo se encuentra actualmente el pádel?')">Actualidad</button>
        </div>
        <div id="chat-container">
            <div id="messages"></div>
            <div class="input-container">
                <div class="input-wrapper">
                    <input type="text" id="message-input" placeholder="Escribe tu mensaje...">
                </div>
                <button onclick="sendMessage()">Send</button>
                <button id="new-chat-btn" onclick="startNewChat()">New Chat</button>
            </div>
        </div>
        <script>
            const messagesContainer = document.getElementById('messages');
            const messageInput = document.getElementById('message-input');
            const startRagBtn = document.getElementById('start-rag-btn');
            const ragStatus = document.getElementById('rag-status');
            let currentChatId = null;
            let currentUserId = null;
            let ragStarted = false;
            let ragPollingTimer = null;

            function applyRagStatus(status, message = '') {
                ragStatus.className = `rag-status ${status}`;
                if (status === 'ready') {
                    ragStatus.textContent = 'Listo';
                    ragStarted = true;
                    startRagBtn.textContent = 'RAG Started';
                    startRagBtn.disabled = true;
                } else if (status === 'initializing') {
                    ragStatus.textContent = 'Inicializando...';
                    ragStarted = false;
                    startRagBtn.textContent = 'Starting...';
                    startRagBtn.disabled = true;
                } else if (status === 'error') {
                    ragStatus.textContent = 'Error al iniciar';
                    ragStatus.title = message || 'Unknown initialization error';
                    ragStarted = false;
                    startRagBtn.textContent = 'Start RAG';
                    startRagBtn.disabled = false;
                } else {
                    ragStatus.textContent = 'No iniciado';
                    ragStatus.title = '';
                    ragStarted = false;
                    startRagBtn.textContent = 'Start RAG';
                    startRagBtn.disabled = false;
                }
            }

            function refreshRagStatus() {
                fetch('/api/rag_status')
                .then(response => response.json())
                .then(data => {
                    applyRagStatus(data.status || 'not_started', data.message || '');
                })
                .catch(() => {
                    applyRagStatus('not_started');
                });
            }

            function stopRagPolling() {
                if (ragPollingTimer) {
                    clearInterval(ragPollingTimer);
                    ragPollingTimer = null;
                }
            }

            function startRagPolling() {
                stopRagPolling();
                ragPollingTimer = setInterval(() => {
                    fetch('/api/rag_status')
                        .then(response => response.json())
                        .then(data => {
                            const status = data.status || 'not_started';
                            applyRagStatus(status, data.message || '');
                            if (status === 'ready' || status === 'error' || status === 'not_started') {
                                stopRagPolling();
                            }
                        })
                        .catch(() => {
                            applyRagStatus('error', 'Status check failed');
                            stopRagPolling();
                        });
                }, 1200);
            }

            function startRag() {
                applyRagStatus('initializing');
                fetch('/api/start_rag', {
                    method: 'POST'
                })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'ready') {
                        applyRagStatus('ready');
                    } else if (data.status === 'initializing') {
                        applyRagStatus('initializing');
                        startRagPolling();
                    } else {
                        applyRagStatus(data.status || 'not_started', data.message || '');
                    }
                    appendMessage('assistant', data.message);
                })
                .catch(() => {
                    applyRagStatus('error', 'Error starting RAG');
                    alert('Error starting RAG');
                });
            }

            function startNewChat() {
                fetch('/api/create_chat', {
                    method: 'POST'
                })
                .then(response => response.json())
                .then(data => {
                    messagesContainer.innerHTML = '';
                })
                .catch(() => {
                    alert('Error creating chat');
                });
            }

            function appendMessage(role, content) {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${role}`;
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                bubble.textContent = content;
                messageDiv.appendChild(bubble);
                messagesContainer.appendChild(messageDiv);
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }

            function sendMessage() {
                const message = messageInput.value.trim();
                if (!message) return;
                if (!ragStarted) {
                    alert("Primero pulsa 'Start RAG'");
                    return;
                }
                appendMessage('user', message);
                messageInput.value = '';

                // Mostrar indicador de escritura
                const typingDiv = document.createElement('div');
                typingDiv.className = 'message assistant';
                typingDiv.id = 'typing';
                typingDiv.innerHTML = '<div class="bubble typing-indicator"><span></span><span></span><span></span></div>';
                messagesContainer.appendChild(typingDiv);
                messagesContainer.scrollTop = messagesContainer.scrollHeight;

                fetch('/api/send_message', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: currentUserId,
                        chat_id: currentChatId,
                        message: message
                    })
                })
                .then(response => response.json())
                .then(data => {
                    document.getElementById('typing')?.remove();
                    if (data.message) {
                        appendMessage('assistant', data.message);
                    } else {
                        appendMessage('assistant', data.detail || 'Error sending message');
                    }
                })
                .catch(() => {
                    document.getElementById('typing')?.remove();
                    alert('Error sending message');
                });
            }

            function fetchData() {
                fetch('/your_endpoint', { method: 'GET' })
                    .then(response => response.json()) // Convert the response to JSON
                    .then(data => {
                        console.log('Success:', data); // Do something with the data
                    })
                    .catch(error => {
                        console.error('Error occurred:', error); // Handle any errors
                    });
            }

            function usePrompt(prompt) {
                messageInput.value = prompt;
                sendMessage();
            }

            document.addEventListener('DOMContentLoaded', startNewChat);
            document.addEventListener('DOMContentLoaded', refreshRagStatus);

            messageInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
        </script>
    </body>
</html>
